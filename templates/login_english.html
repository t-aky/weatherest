{% extends "base_english.html" %}
{% block title %}Log in{% endblock %}
{% block body %}
    <div class="box">
        {% if error %}
            <div class="notification is-danger">
                ユーザー名かパスワードを間違えているようです。
            </div>
        {% elif checkout %}
            {{message}}
        {% else %}
        {% endif %}
        <form action="{{ url_for['mypage'] }}" method="POST">
            <div class="field">
                <div class="control">
                    <input class="input is-large" type="email" name="email" placeholder="Your Email" autofocus="" required>
                </div>
            </div>

            <div class="field">
                <div class="control">
                    <input class="input is-large" type="password" name="password" placeholder="Your Password" required>
                </div>
            </div>
            <div class="field">
              <div class="control">
                  <input class="input is-large" type="text" name="name" placeholder="Name" autofocus="">
              </div>
            </div>
            <div class="field">
                <label class="checkbox">
                    <input type="checkbox" id ="remember_me">
                    Remember me
                </label>
            </div>
            <button class="button is-block is-info is-large is-fullwidth">Login</button>
        </form>
    </div>
{% endblock %}
