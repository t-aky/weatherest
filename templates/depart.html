<body>
    <details>
    <summary>出発時刻</summary>
    <input type="date" id="after_arrival_date"
        name="after_arrival_date" value="2018-06-12"
        min="2023-03-22" max="2033-03-30" style="color:red">
    <script type="text/javascript">
        window.addEventListener('load', () => {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('after_arrival_date').value = now.toISOString().slice(0, 10);
        });
    </script>
    <input type="time" id="after_arrival_time"
    name="after_arrival_time" value="2018-06-12"
    min="2023-03-22" max="2033-03-30" style="color:red"><font color="red">に</font>
    <script type="text/javascript">
        window.addEventListener('load', () => {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('after_arrival_time').value = now.toISOString().slice(11, -8);
        });
    </script>
    <br>
    <label><font color="orangered">準備時間を</font></label>
    <input type="number" min="0" max="100" id="prepare_time" name="prepare_time" value="0" style="color:orangered">
    <font color="orangered">分だけ余裕見て出発して、</font>
    <br>
    <button name="wheel" style="color:purple">バリアフリー対応</button>
    <br>
    <label><font color="blue">出発施設</font></label>
    <input name="after_depart_pos"name="say" id="after_depart_pos" value="-" style="color:blue">
    <br>
    <label><font color="blue">もしくは出発停留所</font></label>
    <input name="after_depart_stop"name="say" id="after_depart_stop" value="-" style="color:blue">
    <br>
    <button name="now"><font color="blue">現在地</font></button><font color="blue">
    <br>
    を出発する。</font>
    </details>
    <details>
    <summary>到着時刻</summary>
    <label><font color="green">出発時刻</font></label>
    <input type="date" id="before_depart_date"
        name="before_depart_date" value="2018-06-12"
        min="2023-03-22" max="2033-03-30" style="color:green">
    <script type="text/javascript">
        window.addEventListener('load', () => {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('before_depart_date').value = now.toISOString().slice(0, 10);
        });
    </script>
    <input type="time" id="before_depart_time"
    name="before_depart_time" value="2018-06-12"
    min="2023-03-22" max="2033-03-30" style="color:green">に
    <script type="text/javascript">
        window.addEventListener('load', () => {
        const now = new Date();
        now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
        document.getElementById('before_depart_time').value = now.toISOString().slice(11, -8);
        });
    </script>
    <br>
    <label><font color="red">到着施設</font></label>
    <br>
    <input id="after_arrival_pos" name="after_arrival_pos" value="-" style="color:red">
    <br>
    <label><font color="red">もしくは到着停留所</font></label>
    <br>
    <input id="after_arrival_stop" name="after_arrival_stop" value="-" style="color:red"><font color="red">に</font>
    <br>

    <font color="orangered">到着時刻の</font>
    <input type="number" min="0" max="100" id="arrival_allow_time" name="arrival_allow_time" value="0" style="color:red" width = "50%">
    <font color="red">分前に到着するために、</font>
    <br>
    <button name="wheel" style="color:purple">バリアフリー対応</button>
    <br>
    <button name="now"><font color="blue">現在地</font></button><font color="blue">
    <br>
    を出発する。</font>
    </details>
